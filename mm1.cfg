MEMORY {
	ROMH:   start = $0,    size = $10;
	ROMS00: start = $0,    size = $1000;
	ROM00:  start = $9000, size = $3000;
	ROMS01: start = $0,    size = $1000;
	ROM01:  start = $9000, size = $3000;
	ROMS02: start = $0,    size = $1000;
	ROM02:  start = $9000, size = $3000;
	ROMS03: start = $0,    size = $1000;
	ROM03:  start = $9000, size = $3000;
	ROMS04: start = $0,    size = $1000;
	ROMA:   start = $9000, size = $3000;
	ROMS05: start = $0,    size = $1000;
	ROM05:  start = $9000, size = $3000;
	ROM06:  start = $8000, size = $4000;
	ROM07:  start = $C000, size = $4000;
}

SEGMENTS {
	AUDIO:   load = ROMA,   type = ro;
	HEADER:  load = ROMH,   type = ro;
	STAGE00: load = ROMS00, type = ro;
	STAGE01: load = ROMS01, type = ro;
	STAGE02: load = ROMS02, type = ro;
	STAGE03: load = ROMS03, type = ro;
	STAGE04: load = ROMS04, type = ro;
	STAGE05: load = ROMS05, type = ro;
	BANK00:  load = ROM00,  type = ro;
	BANK01:  load = ROM01,  type = ro;
	BANK02:  load = ROM02,  type = ro;
	BANK03:  load = ROM03,  type = ro;
	BANK05:  load = ROM05,  type = ro;
	BANK06:  load = ROM06,  type = ro;
	BANK07:  load = ROM07,  type = ro;
}